```html
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Admin AEM BOOTS</title>
<style>
body{
font-family:Arial;
padding:30px;
background:#f5f5f5;
}
input,button{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}
button{
background:black;
color:white;
font-weight:bold;
cursor:pointer;
}
.card{
background:white;
padding:15px;
margin-top:10px;
border-radius:10px;
}
</style>
</head>
<body>

<h2>Ajouter Produit</h2>

<input id="name" placeholder="Nom produit">
<input id="price" placeholder="Prix">
<input id="tag" placeholder="Tag (Nike / Adidas / Maillot)">
<input id="image" placeholder="Lien image">
<input id="type" placeholder="shoe / shirt / acc">

<button onclick="addProduct()">Ajouter</button>

<div id="products"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDzj7H-NrdCwd4RhqAymsC-RK9PMvhx2a4",
  authDomain: "aemboots-be5bc.firebaseapp.com",
  projectId: "aemboots-be5bc",
  storageBucket: "aemboots-be5bc.firebasestorage.app",
  messagingSenderId: "474434688254",
  appId: "1:474434688254:web:e661e88c94b0ffb52981af"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addProduct = async function() {
const name = document.getElementById("name").value;
const price = document.getElementById("price").value;
const tag = document.getElementById("tag").value;
const image = document.getElementById("image").value;
const type = document.getElementById("type").value;

await addDoc(collection(db,"products"),{
name,
price,
tag,
image,
type
});

alert("Produit ajouté");
loadProducts();
}

async function loadProducts(){
const productsDiv=document.getElementById("products");
productsDiv.innerHTML="";

const querySnapshot = await getDocs(collection(db,"products"));

querySnapshot.forEach((item)=>{
const p=item.data();

productsDiv.innerHTML += `
<div class="card">
<h3>${p.name}</h3>
<p>${p.price} DH</p>
<button onclick="deleteProduct('${item.id}')">Supprimer</button>
</div>
`;
});
}

window.deleteProduct = async function(id){
await deleteDoc(doc(db,"products",id));
loadProducts();
}

loadProducts();
</script>

</body>
</html>
```
